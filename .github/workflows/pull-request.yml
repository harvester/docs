name: Pull Request Build

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          PUPPETEER_DOWNLOAD_BASE_URL=https://storage.googleapis.com/chrome-for-testing-public yarn install --frozen-lockfile

      - name: Build
        run: |
          yarn gen-api-docs
          yarn build

      - name: Upload build to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: ./build

      - name: Save PR data to artifact
        run: |
          {
            echo "PR_NUMBER=${{ github.event.pull_request.number }}"
            echo "HEAD_SHA=${{ github.event.pull_request.head.sha }}"
          } > pr-data.env

      - name: Upload PR data artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-data
          path: pr-data.env
